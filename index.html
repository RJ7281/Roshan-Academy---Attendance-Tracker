<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Roshan Academy</title>
    <link rel="icon" type="image/x-icon" href="images/faviocn.ico" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
<body class="min-h-screen flex items-center justify-center bg-cover bg-center bg-no-repeat bg-fixed font-[Inter,sans-serif]" 
      style="background-image: url('images/Quiz-Background.jpg');">

    <div class="absolute inset-0 bg-black/30 backdrop-blur-[2px]"></div>

    <div id="login-screen" class="relative z-10 bg-white/90 backdrop-blur-md p-10 rounded-2xl shadow-2xl w-full max-w-md mx-4 transition-all duration-300">
        <div class="text-center mb-8">
            <h2 class="text-4xl font-extrabold text-blue-600 tracking-tight">Roshan Academy</h2>
            <p class="text-gray-500 mt-2 font-medium">Attendance Tracker</p>
        </div>
        
        <div class="relative mb-6">
            <input type="password" id="master-pass" placeholder="Enter Password" 
                   class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all text-center text-lg">
            <button id="toggle-password" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-blue-600">
                <i class="fas fa-eye"></i>
            </button>
        </div>

        <button id="enter-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-xl font-bold text-lg shadow-lg hover:shadow-blue-500/30 transform active:scale-[0.98] transition-all">
            Unlock Tracker
        </button>
        
        <p id="login-error" class="text-red-500 mt-4 text-center font-medium hidden animate-pulse">
            <i class="fas fa-exclamation-circle mr-1"></i> Wrong Password!
        </p>
    </div>

    <div id="attendance-screen" class="hidden relative z-10 bg-white p-8 rounded-2xl shadow-2xl w-full max-w-2xl mx-4 my-8">
        <div class="flex justify-between items-center mb-8 border-b pb-4">
            <h2 class="text-2xl font-bold text-gray-800">Attendance Tracker</h2>
            <button id="lock-btn" class="bg-gray-100 text-gray-600 px-4 py-2 rounded-lg font-bold hover:bg-red-50 hover:text-red-600 transition-colors">
                <i class="fas fa-lock mr-2"></i>Lock App
            </button>
        </div>

        <div class="grid grid-cols-2 gap-6 mb-8">
            <div class="space-y-1">
                <label class="text-xs font-bold text-gray-400 uppercase tracking-wider">Select Date</label>
                <input type="date" id="attendance-date" class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div class="space-y-1">
                <label class="text-xs font-bold text-gray-400 uppercase tracking-wider">Standard / Class</label>
                <select id="attendance-std" class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none appearance-none bg-white">
                    <option value="1">1st Standard</option>
                    <option value="2">2nd Standard</option>
                    <option value="3">3rd Standard</option>
                    <option value="4">4th Standard</option>
                    <option value="5">5th Standard</option>
                    <option value="6">6th Standard</option>
                    <option value="7">7th Standard</option>
                    <option value="8">8th Standard</option>
                    <option value="9">9th Standard</option>
                    <option value="10">10th Standard</option>
                </select>
            </div>
        </div>

        <div class="overflow-hidden border border-gray-100 rounded-xl mb-6">
            <table class="w-full border-collapse">
                <thead>
                    <tr class="bg-gray-50 text-gray-500">
                        <th class="p-4 text-left text-sm font-semibold uppercase">Roll No</th>
                        <th class="p-4 text-left text-sm font-semibold uppercase">Student Name</th>
                        <th class="p-4 text-center text-sm font-semibold uppercase">Status</th>
                    </tr>
                </thead>
                <tbody id="attendance-body" class="divide-y divide-gray-50">
                    </tbody>
            </table>
        </div>

        <button id="save-attendance" class="w-full bg-green-600 hover:bg-green-700 text-white p-4 rounded-xl font-bold text-lg shadow-lg hover:shadow-green-500/30 transform active:scale-[0.98] transition-all">
            Save Attendance ✅
        </button>
    </div>

    <script type="module" src="index.js"></script>
</body>
        </html>
